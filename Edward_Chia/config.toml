[client]
toolbarMode = "viewer"

[server]
headless = true

[theme]
primaryColor = "#7C3AED"
font = "Inter:https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"
codeFont = "'JetBrains Mono':https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500&display=swap"
codeFontSize = "0.85rem"
baseFontSize = 14
baseFontWeight = 400
headingFontWeights = [700, 600, 600, 500, 500, 500]
linkUnderline = false
showWidgetBorder = false
showSidebarBorder = false
baseRadius = "8px"
buttonRadius = "8px"
chartCategoricalColors = ["#7C3AED", "#A78BFA", "#EC4899", "#14B8A6", "#F59E0B", "#EF4444", "#22C55E"]
violetColor = "#7C3AED"
blueColor = "#6366F1"
greenColor = "#22C55E"
yellowColor = "#F59E0B"
orangeColor = "#F97316"
redColor = "#EF4444"

[theme.dark]
backgroundColor = "#0E1117"
secondaryBackgroundColor = "#1A1D27"
codeBackgroundColor = "#1A1D27"
textColor = "#FAFAFA"
linkColor = "#A78BFA"
borderColor = "#2D2D45"

[theme.dark.sidebar]
backgroundColor = "#111827"
secondaryBackgroundColor = "#1A1D27"
borderColor = "#2D2D45"

[theme.light]
backgroundColor = "#FFFFFF"
secondaryBackgroundColor = "#F4F2FF"
codeBackgroundColor = "#EDE9FB"
textColor = "#1C1430"
linkColor = "#7C3AED"
borderColor = "#DDD8F0"

[theme.light.sidebar]
backgroundColor = "#F8F7FF"
secondaryBackgroundColor = "#EDE9FB"
borderColor = "#DDD8F0"
