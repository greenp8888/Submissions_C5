agents:
  orchestrator:
    role: route incident execution and apply severity overrides
  planner:
    role: build the top-level investigation plan
  decomposer:
    role: break the query into retrieval and reasoning tasks
  ingestion:
    role: ingest logs and code into LanceDB
  retriever:
    role: retrieve high-signal chunks for contextual reasoning
  normalizer:
    role: parse raw logs into normalized events and issue candidates
  evidence:
    role: extract support for the key claims
  verifier:
    role: verify evidence quality and confidence
  critical_analysis:
    role: assign final severity and escalation path
  insight_generator:
    role: synthesize findings and remediation guidance
  code_generator:
    role: generate implementation-ready patches and analogies
  cookbook_synthesizer:
    role: turn the incident into a reusable checklist
  report_builder:
    role: produce markdown and Mermaid outputs
  qa:
    role: validate completeness before export
  self_correct:
    role: repair incomplete outputs and retry the pipeline
  notification_agent:
    role: send Slack and Salesforce updates
  jira_ticket_agent:
    role: create Jira tickets for high/critical incidents
  export_agent:
    role: package downloadable artifacts
