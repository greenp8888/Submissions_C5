<svg width="800" height="1200" viewBox="0 0 800 1200" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="800" height="1200" rx="24" fill="#0a0a0a"/>
  
  <!-- Title -->
  <text x="400" y="60" text-anchor="middle" fill="white" font-family="sans-serif" font-size="32" font-weight="bold">System Architecture</text>
  <text x="400" y="90" text-anchor="middle" fill="#666" font-family="sans-serif" font-size="16">Sequential Multi-Agent Research Orchestration</text>

  <!-- Nodes -->
  <!-- User Query -->
  <rect x="275" y="150" width="250" height="100" rx="16" fill="#1e1e1e" stroke="#333" stroke-width="1"/>
  <text x="400" y="195" text-anchor="middle" fill="#3b82f6" font-family="sans-serif" font-size="18" font-weight="bold">User Query</text>
  <text x="400" y="220" text-anchor="middle" fill="#888" font-family="sans-serif" font-size="14">Natural language research request</text>

  <!-- Arrow 1 -->
  <path d="M400 250V300" stroke="#3b82f6" stroke-width="2" stroke-dasharray="4 4"/>
  <path d="M395 295L400 300L405 295" stroke="#3b82f6" stroke-width="2"/>

  <!-- Planner Agent -->
  <rect x="275" y="300" width="250" height="100" rx="16" fill="#1e1e1e" stroke="#333" stroke-width="1"/>
  <text x="400" y="345" text-anchor="middle" fill="#6366f1" font-family="sans-serif" font-size="18" font-weight="bold">Planner Agent</text>
  <text x="400" y="370" text-anchor="middle" fill="#888" font-family="sans-serif" font-size="14">Deconstructs query into search strategies</text>

  <!-- Arrow 2 -->
  <path d="M400 400V450" stroke="#6366f1" stroke-width="2" stroke-dasharray="4 4"/>
  <path d="M395 445L400 450L405 445" stroke="#6366f1" stroke-width="2"/>

  <!-- Retriever Agent -->
  <rect x="275" y="450" width="250" height="100" rx="16" fill="#1e1e1e" stroke="#333" stroke-width="1"/>
  <text x="400" y="495" text-anchor="middle" fill="#06b6d4" font-family="sans-serif" font-size="18" font-weight="bold">Retriever Agent</text>
  <text x="400" y="520" text-anchor="middle" fill="#888" font-family="sans-serif" font-size="14">Fetches real-time data from web sources</text>

  <!-- Google Search Tool -->
  <rect x="550" y="470" width="200" height="60" rx="12" fill="#06b6d4" fill-opacity="0.1" stroke="#06b6d4" stroke-width="1" stroke-opacity="0.3"/>
  <text x="650" y="505" text-anchor="middle" fill="#06b6d4" font-family="sans-serif" font-size="14">Google Search Grounding</text>
  <path d="M525 500H550" stroke="#06b6d4" stroke-width="1" stroke-opacity="0.3"/>

  <!-- Arrow 3 -->
  <path d="M400 550V600" stroke="#06b6d4" stroke-width="2" stroke-dasharray="4 4"/>
  <path d="M395 595L400 600L405 595" stroke="#06b6d4" stroke-width="2"/>

  <!-- Analyst Agent -->
  <rect x="275" y="600" width="250" height="100" rx="16" fill="#1e1e1e" stroke="#333" stroke-width="1"/>
  <text x="400" y="645" text-anchor="middle" fill="#10b981" font-family="sans-serif" font-size="18" font-weight="bold">Analyst Agent</text>
  <text x="400" y="670" text-anchor="middle" fill="#888" font-family="sans-serif" font-size="14">Validates sources &amp; identifies contradictions</text>

  <!-- Arrow 4 -->
  <path d="M400 700V750" stroke="#10b981" stroke-width="2" stroke-dasharray="4 4"/>
  <path d="M395 745L400 750L405 745" stroke="#10b981" stroke-width="2"/>

  <!-- Synthesizer Agent -->
  <rect x="275" y="750" width="250" height="100" rx="16" fill="#1e1e1e" stroke="#333" stroke-width="1"/>
  <text x="400" y="795" text-anchor="middle" fill="#f59e0b" font-family="sans-serif" font-size="18" font-weight="bold">Synthesizer Agent</text>
  <text x="400" y="820" text-anchor="middle" fill="#888" font-family="sans-serif" font-size="14">Generates hypotheses &amp; emerging trends</text>

  <!-- Arrow 5 -->
  <path d="M400 850V900" stroke="#f59e0b" stroke-width="2" stroke-dasharray="4 4"/>
  <path d="M395 895L400 900L405 895" stroke="#f59e0b" stroke-width="2"/>

  <!-- Writer Agent -->
  <rect x="275" y="900" width="250" height="100" rx="16" fill="#1e1e1e" stroke="#333" stroke-width="1"/>
  <text x="400" y="945" text-anchor="middle" fill="#f43f5e" font-family="sans-serif" font-size="18" font-weight="bold">Writer Agent</text>
  <text x="400" y="970" text-anchor="middle" fill="#888" font-family="sans-serif" font-size="14">Compiles final structured Markdown report</text>

  <!-- Arrow 6 -->
  <path d="M400 1000V1050" stroke="#f43f5e" stroke-width="2" stroke-dasharray="4 4"/>
  <path d="M395 1045L400 1050L405 1045" stroke="#f43f5e" stroke-width="2"/>

  <!-- Exports -->
  <rect x="150" y="1050" width="500" height="100" rx="20" fill="#111" stroke="#222" stroke-width="1"/>
  <text x="233" y="1090" text-anchor="middle" fill="#555" font-family="sans-serif" font-size="10" font-weight="bold">EXPORT</text>
  <text x="233" y="1115" text-anchor="middle" fill="#ccc" font-family="sans-serif" font-size="14">PDF Document</text>
  
  <text x="400" y="1090" text-anchor="middle" fill="#555" font-family="sans-serif" font-size="10" font-weight="bold">EXPORT</text>
  <text x="400" y="1115" text-anchor="middle" fill="#ccc" font-family="sans-serif" font-size="14">Colab Notebook</text>

  <text x="566" y="1090" text-anchor="middle" fill="#555" font-family="sans-serif" font-size="10" font-weight="bold">EXPORT</text>
  <text x="566" y="1115" text-anchor="middle" fill="#ccc" font-family="sans-serif" font-size="14">Markdown Text</text>
</svg>
