# Docker Compose for NovaMind AI Researcher (YAML format).
# There is no standard docker-compose.xml; Compose files are YAML (.yml / .yaml).

name: novamind-researcher

services:
  novamind:
    build:
      context: .
      dockerfile: Dockerfile
    image: novamind-ai-researcher:latest
    container_name: novamind-ai-researcher
    ports:
      - "${STREAMLIT_PORT:-8501}:8501"
    # Create `.env` from `.env.example` before first run (see DOCKER.md).
    env_file:
      - .env
    environment:
      STREAMLIT_SERVER_HEADLESS: "true"
      STREAMLIT_SERVER_FILE_WATCHER_TYPE: "none"
      # Set to 0 in production behind HTTPS; 1 allows OAuth over http://localhost
      OAUTHLIB_INSECURE_TRANSPORT: "${OAUTHLIB_INSECURE_TRANSPORT:-1}"
      HF_HOME: /root/.cache/huggingface
    volumes:
      - novamind_user_data:/app/user-data
      - novamind_hf_cache:/root/.cache/huggingface
    restart: unless-stopped

volumes:
  novamind_user_data:
  novamind_hf_cache:
